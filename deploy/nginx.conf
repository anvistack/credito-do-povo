# /etc/nginx/sites-available/facil-credito
# SPA TanStack Start (build estático) + Supabase no client.
# Copie para /etc/nginx/sites-available/ e crie o symlink em sites-enabled/.

# Redireciona HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com www.seu-dominio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seu-dominio.com www.seu-dominio.com;

    # Pasta gerada por `bun run build` (conteúdo de dist/client)
    root /var/www/facil-credito;
    index index.html;

    # ---- SSL (preenchido pelo Certbot) ----
    ssl_certificate     /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- Compressão ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---- Limites ----
    client_max_body_size 20m;  # margem para upload de CSV de leads
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ---- Cache de assets com hash (imutáveis) ----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- index.html não deve ser cacheado (deploy reflete na hora) ----
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ---- SPA fallback: TanStack Router resolve a rota no client ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- robots e favicon silenciosos ----
    location = /robots.txt  { log_not_found off; access_log off; }
    location = /favicon.ico { log_not_found off; access_log off; }

    # ---- Headers de segurança ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Bloqueia acesso a arquivos ocultos
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}
