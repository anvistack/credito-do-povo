# /etc/nginx/sites-available/facil-credito
# SPA estático (TanStack Router roda no client) + Supabase via browser.
#
# Passo a passo:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/facil-credito
#   sudo ln -sf /etc/nginx/sites-available/facil-credito /etc/nginx/sites-enabled/facil-credito
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Depois que estiver funcionando em HTTP, rode:
#   sudo certbot --nginx -d seu-dominio.com -d www.seu-dominio.com
# O Certbot adiciona o bloco 443 e o redirect 80->443 automaticamente.

server {
    listen 80;
    listen [::]:80;

    # Troque pelo seu domínio. Se ainda não tem domínio, use "_" para aceitar qualquer host.
    server_name seu-dominio.com www.seu-dominio.com;

    # Pasta com o conteúdo de dist/client/ enviado pelo deploy.sh
    root /var/www/facil-credito;
    index index.html;

    # ---- Compressão ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    client_max_body_size 20m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Assets com hash do Vite (imutáveis)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Outros estáticos por extensão
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # index.html nunca em cache (deploy reflete na hora)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # === FALLBACK CRÍTICO PARA O SPA ===
    # Sem isso, qualquer rota tipo /admin/dashboard dá 404 no refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt  { log_not_found off; access_log off; }
    location = /favicon.ico { log_not_found off; access_log off; }

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Bloqueia arquivos ocultos (mas libera /.well-known/ pro Certbot)
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}
